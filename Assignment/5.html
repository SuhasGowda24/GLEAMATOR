<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bootstrap</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background-color:#f4f4f4;
}

h2{
    margin-bottom:30px;
}

.row div{
    text-align:center;
    font-size:20px;
    border-radius:8px;
}

</style>

</head>

<body>

<div class="container mt-4">
    
<h2 class="text-center">Bootstrap Grid Layout</h2>

<div class="row">

<div class="col-md-4 bg-primary text-white p-4">Column 1</div>

<div class="col-md-4 bg-success text-white p-4">Column 2</div>

<div class="col-md-4 bg-danger text-white p-4">Column 3</div>
</div>
</div>

</body>
</html>
