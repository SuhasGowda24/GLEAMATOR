<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DOM</title>
</head>

<body>

<h2>JavaScript DOM</h2>

<p id="message">This is the original text.</p>

<button onclick="changeText()">Click Me</button>

<script>
function changeText() {
    document.getElementById("message").innerText = "The text has been changed!!!";
}
</script>

</body>
</html>
